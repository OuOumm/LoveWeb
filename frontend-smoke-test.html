<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>LoveWeb Frontend Smoke Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 24px; line-height: 1.6; }
        .pass { color: #15803d; }
        .fail { color: #b91c1c; }
        code { background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }
    </style>
</head>
<body>
    <h1>LoveWeb Frontend Smoke Test</h1>
    <p>Open this file in a browser after <code>index.html</code>. It validates key UI regression points.</p>
    <ul id="results"></ul>

    <script>
        const results = document.getElementById('results');

        function addResult(ok, message) {
            const li = document.createElement('li');
            li.className = ok ? 'pass' : 'fail';
            li.textContent = `${ok ? 'PASS' : 'FAIL'} - ${message}`;
            results.appendChild(li);
        }

        async function run() {
            try {
                const response = await fetch('./index.html');
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                const messageCount = doc.getElementById('messageCount');
                addResult(!!messageCount, 'message counter node exists');

                const bgOptions = [...doc.querySelectorAll('.bg-option')];
                addResult(bgOptions.length === 4, 'four background options are defined');
                addResult(bgOptions.some((item) => item.getAttribute('data-bg') === 'love-primary'), 'default love-primary option exists');

                const exampleLinks = [...doc.querySelectorAll('#examples a[href]')].map((item) => item.getAttribute('href'));
                addResult(exampleLinks.includes('view.php?example=1'), 'example 1 link points to the correct page');
                addResult(exampleLinks.includes('view.php?example=2'), 'example 2 link points to the correct page');
                addResult(exampleLinks.includes('view.php?example=3'), 'example 3 link points to the correct page');

                addResult(html.includes('navigator.clipboard') || html.includes('document.execCommand'), 'copy logic is present');
                addResult(html.includes('function copyToClipboard(text)'), 'copy helper exists');
                addResult(html.includes('function setShareLinks(url)'), 'share helper exists');
                addResult(html.includes('setTimeout(() => heart.remove(), 7000)'), 'heart cleanup timeout is bounded');
                addResult(html.includes("typeof window.QRCode !== 'function'"), 'QRCode access is guarded');
                addResult(html.includes('function renderQRCodeFallback(url)'), 'QR fallback renderer exists');
                addResult(html.includes('renderQRCode(data.url);'), 'submit flow uses resilient QR rendering');
            } catch (error) {
                addResult(false, `test execution failed: ${error.message}`);
            }
        }

        run();
    </script>
</body>
</html>
